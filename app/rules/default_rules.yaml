    explanation: "按类别统计商品数量。"
    priority: 3
    tags: ["product", "category"]

  - keywords: ["类别", "商品数量"]
    sql: "SELECT category, COUNT(*) AS product_count FROM products GROUP BY category ORDER BY product_count DESC LIMIT 20;"
    explanation: "按类别统计商品数量。"
