  - keywords: ["product_id", "销量"]
    sql: "SELECT product_id, SUM(quantity) AS total_quantity FROM order_items GROUP BY product_id ORDER BY total_quantity DESC LIMIT 20;"
    explanation: "按 product_id 统计销量。"
