name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        pip install pytest
        pytest tests/ -v
    
    - name: Build Docker image
      run: |
        docker build -t text2sql-agent:${{ github.sha }} .
    
    - name: Push to registry
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "Pushing image for tag ${{ github.ref_name }}"