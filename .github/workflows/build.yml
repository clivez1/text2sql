name: Build

on:
  push:
    branches: [ main ]
  tags:
    - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create .impKey from GitHub Secrets
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        LLM_MODEL: ${{ secrets.LLM_MODEL }}
      run: |
        cat > .impKey << 'EOF'
        APP_ENV=dev
        APP_HOST=0.0.0.0
        APP_PORT=8000
        LLM_API_KEY=${LLM_API_KEY}
        LLM_BASE_URL=${LLM_BASE_URL}
        LLM_MODEL=${LLM_MODEL}
        DB_TYPE=sqlite
        DB_URL=sqlite:///data/demo_db/sales.db
        ALLOWED_TABLES=orders,products,order_items,customers
        VECTOR_DB_PATH=./.deploy/chroma
        SQL_MAX_ROWS=200
        SQL_QUERY_TIMEOUT=15
        READONLY_MODE=true
        API_KEY_ENABLED=false
        API_KEYS=
        API_KEY_HEADER=X-API-Key
        ENABLE_HISTORY=true
        ENABLE_CHART=true
        ENABLE_CLARIFICATION=false
        EOF

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        pip install pytest
        pytest tests/ -v

    - name: Build Docker image
      run: |
        docker build -t text2sql-agent:${{ github.sha }} .

    - name: Push to registry
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "Pushing image for tag ${{ github.ref_name }}"
